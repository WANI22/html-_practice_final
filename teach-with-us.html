<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teach with us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('background.jpg');
            background-size: cover;
            position: relative;
        }
        form {
            margin: 50px auto;
            margin-top: 100px;
            width: 400px;
            padding: 40px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: rgba(255, 255, 255, 0.8);
        }
        label {
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        input[type="submit"] {
            width: 30%;
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            margin-left: -2px;
        }
        input[type="submit"]:hover {
            background-color: pink;
        }
        h1 {
            text-align: center;
            color: #333;
        }
            textarea {
                width: 100%;
                height: 100px;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
                resize: vertical;
                margin: 10px 0;
            }
                input[type="file"] {
                    margin-top: 10px;
                }

    </style>
</head>
<body>
    <form action="post">
        <h1>Teach with Us</h1>
        <label for="name"> Full Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="experience">Teaching Experience:</label>
        <input type="text" id="experience" name="experience" required><br><br>

         <label for="qualifications">Qualifications:</label>
        <input type="text" id="qualifications" name="qualifications" required><br><br>

        <label for="subject">Subject To Teach:</label>
        <input type="text" id="subject" name="subjects" required><br><br>

        <fieldset>
            <legend>Preferred Teaching Mode:</legend>
            <input type="radio" id="online" name="teaching_mode" value="online" required>
            <label for="online">Online</label><br>
            <input type="radio" id="in_person" name="teaching_mode" value="in_person">
            <label for="in_person">In-person</label><br>
        </fieldset>

        <textarea name="Introduce Yourself" id="">Introduce Yourself</textarea>
        <p>Brief Description of Yourself</p>

        <input type="file" name="resume" id="resume" ><br><br>
        
        <input type="submit" value="Submit">
    </form>
</body>
</html>
